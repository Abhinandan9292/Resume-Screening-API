<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Master Profile Upload</h2>
        
        <form id="studentForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">First Name</label>
                    <input type="text" id="first_name" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Last Name</label>
                    <input type="text" id="last_name" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Email address</label>
                <input type="email" id="email" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">CGPA (e.g. 8.5)</label>
                    <input type="number" step="0.01" id="cgpa" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">GitHub Link</label>
                    <input type="text" id="github" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 mt-4">
                Submit Profile
            </button>
        </form>

        <div id="statusMessage" class="mt-4 text-center font-bold hidden"></div>
    </div>

   <script>
    document.getElementById('studentForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.innerText = "Saving to Database...";

        const studentData = {
            first_name: document.getElementById('first_name').value,
            last_name: document.getElementById('last_name').value,
            email: document.getElementById('email').value,
            cgpa: parseFloat(document.getElementById('cgpa').value),
            github_link: document.getElementById('github').value
        };

        try {
            // WE ARE POINTING THIS TO THE RENDER CLOUD URL NOW
            const response = await fetch('https://resume-screening-api-vqq8.onrender.com/add_student', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(studentData)
            });

            const result = await response.json();
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.classList.remove('hidden');

            if (result.status === 'success') {
                statusDiv.innerText = "Success! Profile locked into the cloud database.";
                statusDiv.className = "mt-4 text-center font-bold text-green-600";
                document.getElementById('studentForm').reset();
            } else {
                statusDiv.innerText = "Error: " + result.message;
                statusDiv.className = "mt-4 text-center font-bold text-red-600";
            }
        } catch (error) {
            // I updated this message to be more helpful for the cloud
            alert("Connection Failed. Your Render server might be waking up. Try again in 30 seconds.");
        } finally {
            submitBtn.innerText = "Submit Profile";
        }
    });
</script>
</body>
</html>
