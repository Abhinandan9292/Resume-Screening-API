<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
        <h2 class="text-3xl font-bold mb-2 text-gray-800">Student Profile</h2>
        <p class="text-gray-500 mb-8 text-sm">Fill in your details or use the AI parser to auto-fill from your PDF resume.</p>

        <div class="mb-8 p-6 bg-blue-50 border-2 border-dashed border-blue-200 rounded-xl text-center">
            <label class="block text-blue-800 font-bold mb-2">🚀 AI Auto-Fill (Upload PDF)</label>
            <input type="file" id="resumeUpload" accept=".pdf" class="text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
            <p id="aiStatus" class="mt-2 text-xs text-blue-600 font-medium"></p>
        </div>

        <form id="studentForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="first_name" placeholder="First Name" required class="border p-3 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none">
                <input type="text" id="last_name" placeholder="Last Name" required class="border p-3 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none">
            </div>
            <input type="email" id="email" placeholder="Email Address" required class="border p-3 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none">
            <input type="password" id="password" placeholder="Create Password" required class="border p-3 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none">
            
            <div class="grid grid-cols-2 gap-4">
                <input type="number" step="0.01" id="cgpa" placeholder="CGPA" required class="border p-3 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none">
                <input type="text" id="github" placeholder="GitHub Link" required class="border p-3 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none">
            </div>

            <label class="block font-bold text-gray-700">Skills</label>
            <textarea id="skills" placeholder="e.g. C++, Python, AI/ML, SQL..." required class="border p-3 rounded-lg w-full h-24 focus:ring-2 focus:ring-blue-400 outline-none"></textarea>

            <label class="block font-bold text-gray-700">Professional Bio</label>
            <textarea id="bio" placeholder="Tell recruiters about yourself..." required class="border p-3 rounded-lg w-full h-32 focus:ring-2 focus:ring-blue-400 outline-none"></textarea>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-200">Register Profile</button>
        </form>
    </div>

    <script>
        const API_BASE = "https://resume-screening-api-vqq8.onrender.com";

        // AI PARSING LOGIC
        document.getElementById('resumeUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const status = document.getElementById('aiStatus');
            status.innerText = "AI is reading your resume... 🧠";
            
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_BASE}/ai_parse`, { method: 'POST', body: formData });
                const data = await response.json();
                document.getElementById('skills').value = data.suggested_skills;
                document.getElementById('bio').value = data.bio_preview;
                status.innerText = "Success! Data extracted. Check the fields below. ✅";
            } catch (error) {
                status.innerText = "Error. Is the Render server awake? ❌";
            }
        });

        // FORM SUBMISSION
        document.getElementById('studentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button');
            submitBtn.innerText = "Saving to Database...";

            const studentData = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                cgpa: parseFloat(document.getElementById('cgpa').value),
                github_link: document.getElementById('github').value,
                skills: document.getElementById('skills').value,
                bio: document.getElementById('bio').value
            };

            try {
                const res = await fetch(`${API_BASE}/register_student`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(studentData)
                });
                const result = await res.json();
                if(result.status === 'success') {
                    alert("Profile Registered Successfully!");
                    window.location.href = 'index.html';
                } else {
                    alert("Error: " + result.message);
                }
            } catch (err) {
                alert("Server Error. Check your connection.");
            } finally {
                submitBtn.innerText = "Register Profile";
            }
        });
    </script>
</body>
</html>
