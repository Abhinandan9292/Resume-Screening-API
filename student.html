<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Profile Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Master Profile Upload</h2>
        <form id="studentForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="first_name" placeholder="First Name" required class="border p-2 rounded w-full">
                <input type="text" id="last_name" placeholder="Last Name" required class="border p-2 rounded w-full">
            </div>
            <input type="email" id="email" placeholder="Email" required class="border p-2 rounded w-full">
            <div class="grid grid-cols-2 gap-4">
                <input type="number" step="0.01" id="cgpa" placeholder="CGPA" required class="border p-2 rounded w-full">
                <input type="text" id="github" placeholder="GitHub Username" required class="border p-2 rounded w-full">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700">Submit Profile</button>
        </form>
        <div id="statusMessage" class="mt-4 text-center font-bold hidden"></div>
    </div>

    <script>
        const API_BASE = "https://resume-screening-api-vqq8.onrender.com";

        document.getElementById('studentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = document.querySelector('button[type="submit"]');
            submitBtn.innerText = "Connecting to Cloud...";

            const studentData = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                email: document.getElementById('email').value,
                cgpa: parseFloat(document.getElementById('cgpa').value),
                github_link: document.getElementById('github').value
            };

            try {
                const response = await fetch(`${API_BASE}/add_student`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(studentData)
                });
                const result = await response.json();
                const statusDiv = document.getElementById('statusMessage');
                statusDiv.classList.remove('hidden');
                
                if (result.status === 'success') {
                    statusDiv.innerText = "Success! Locked into Database.";
                    statusDiv.className = "mt-4 text-center text-green-600";
                    document.getElementById('studentForm').reset();
                } else {
                    statusDiv.innerText = "Error: " + result.message;
                    statusDiv.className = "mt-4 text-center text-red-600";
                }
            } catch (error) {
                alert("Server is waking up. Try again in 30 seconds.");
            } finally {
                submitBtn.innerText = "Submit Profile";
            }
        });
    </script>
</body>
</html>
