<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Portal | Talent Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-8 font-sans">
    
    <div class="max-w-6xl mx-auto mb-10 flex justify-between items-center bg-slate-900 p-6 rounded-2xl shadow-lg">
        <div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Student Job Board</h1>
            <p class="text-slate-400 mt-1">Discover and apply for your next career opportunity.</p>
        </div>
        <div class="bg-slate-800 text-green-400 px-4 py-2 rounded-lg font-bold border border-slate-700 shadow-sm">
            Candidate Session
        </div>
    </div>

    <div id="jobs-grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        <p class="text-slate-500 font-bold col-span-full text-center py-10 animate-pulse">Loading open positions from database...</p>
    </div>

    <script>
        const API_BASE = "https://resume-screening-api-vqq8.onrender.com";

        window.onload = () => {
            loadJobs();
        };

        // --- Fetch all jobs from the database ---
        async function loadJobs() {
            const grid = document.getElementById('jobs-grid');
            try {
                const response = await fetch(`${API_BASE}/jobs`);
                const jobs = await response.json();
                grid.innerHTML = '';

                if (jobs.length === 0) {
                    grid.innerHTML = `<div class="col-span-full bg-white p-10 rounded-2xl text-center border border-slate-200">
                        <p class="text-xl font-bold text-slate-500">No jobs posted yet.</p>
                        <p class="text-slate-400 mt-2">Check back later when recruiters have published new roles.</p>
                    </div>`;
                    return;
                }

                jobs.forEach(job => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:shadow-lg transition flex flex-col justify-between";
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <h2 class="text-2xl font-black text-slate-800 tracking-tight">${job.job_title}</h2>
                                <span class="bg-green-100 text-green-700 font-bold px-3 py-1 rounded-full text-xs border border-green-200 whitespace-nowrap">
                                    ${job.salary || 'Not Disclosed'}
                                </span>
                            </div>
                            
                            <p class="text-indigo-600 font-bold text-sm uppercase tracking-wide mb-4">
                                🏢 ${job.company_name || 'Confidential Company'}
                            </p>
                            
                            <div class="flex flex-wrap gap-2 mb-4">
                                <span class="bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded font-semibold flex items-center gap-1">
                                    📍 ${job.location}
                                </span>
                                <span class="bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded font-semibold flex items-center gap-1">
                                    ⏳ ${job.required_exp} Yrs Exp
                                </span>
                            </div>
                            
                            <p class="text-slate-600 text-sm mb-6 line-clamp-3 leading-relaxed">
                                ${job.job_description}
                            </p>
                        </div>
                        
                        <button onclick="applyForJob(${job.job_id}, this)" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl transition shadow-md shadow-slate-300">
                            Apply for Role
                        </button>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                grid.innerHTML = '<p class="text-center col-span-full text-red-500 font-bold">Failed to load jobs. Is the API running?</p>';
            }
        }

        // --- Apply for a specific job ---
        async function applyForJob(jobId, btnElement) {
            btnElement.innerText = "Submitting...";
            btnElement.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/student/apply/${jobId}`, { method: 'POST' });
                const result = await response.json();

                if (result.status === 'success') {
                    btnElement.innerText = "✅ Applied Successfully";
                    btnElement.classList.replace('bg-slate-900', 'bg-green-600');
                    btnElement.classList.replace('hover:bg-slate-800', 'hover:bg-green-700');
                } else {
                    alert("Notice: " + result.message);
                    btnElement.innerText = "Apply for Role";
                    btnElement.disabled = false;
                }
            } catch (error) {
                alert("Connection failed.");
                btnElement.innerText = "Apply for Role";
                btnElement.disabled = false;
            }
        }
    </script>
</body>
</html>
