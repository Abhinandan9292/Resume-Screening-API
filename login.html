<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login | Talent Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-8">
    
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
            <p class="text-gray-500 text-sm mt-2">Enter your credentials to access your vault.</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" required class="border p-3 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none transition">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required class="border p-3 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none transition">
            </div>

            <button type="submit" class="w-full bg-gray-900 text-white font-bold py-4 rounded-xl hover:bg-black transition shadow-lg shadow-gray-300">
                Secure Login
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Don't have a profile? <a href="student.html" class="text-blue-600 font-bold hover:underline">Register here</a>
        </p>
    </div>

    <script>
        const API_BASE = "https://resume-screening-api-vqq8.onrender.com";

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button');
            submitBtn.innerText = "Verifying...";

            const loginData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });

                const result = await res.json();
                
                if (result.status === 'success') {
                    // 🧠 THE MAGIC TRICK: Save the user data to the browser's memory!
                    localStorage.setItem('studentSession', JSON.stringify(result.user));
                    
                    alert("Login Successful! Welcome " + result.user.FName);
                    window.location.href = 'dashboard.html'; // We will build this next!
                } else {
                    alert("Access Denied: " + result.message);
                }
            } catch (err) {
                alert("Server Connection Failed. Is Render awake?");
                console.error(err);
            } finally {
                submitBtn.innerText = "Secure Login";
            }
        });
    </script>
</body>
</html>
