<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recruiter Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-bold mb-2">Recruiter <span class="text-emerald-400">Gateway</span></h1>
        <p class="text-slate-400 mb-8">Search our elite talent database by skill or tech stack.</p>

        <div class="mb-10">
            <input type="text" id="skillSearch" onkeyup="searchSkills()" placeholder="Search by skills (e.g. 'cpp', 'python', 'aiml')..." 
                   class="w-full bg-slate-800 border-2 border-slate-700 p-5 rounded-2xl text-xl text-emerald-300 focus:outline-none focus:border-emerald-500 shadow-xl transition-all">
        </div>

        <div id="resultsGrid" class="grid md:grid-cols-2 gap-6">
            </div>
    </div>

    <script>
        const API_BASE = "https://resume-screening-api-vqq8.onrender.com";

        async function searchSkills() {
            const query = document.getElementById('skillSearch').value;
            const res = await fetch(`${API_BASE}/search?skills=${query}`);
            const students = await res.json();
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';

            students.forEach(s => {
                grid.innerHTML += `
                    <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 hover:border-emerald-500/50 transition">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-2xl font-bold text-white">${s.FName} ${s.LName}</h3>
                                <p class="text-slate-500 text-sm font-mono">${s.Email}</p>
                            </div>
                            <div class="text-3xl font-black text-emerald-400">${s.CGPA}</div>
                        </div>
                        <div class="mb-4">
                            <p class="text-xs font-bold text-slate-500 uppercase mb-2">Technical Stack</p>
                            <div class="flex flex-wrap gap-2">
                                ${s.Skills.split(',').map(skill => `<span class="bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-lg border border-emerald-500/20 text-xs">${skill.trim()}</span>`).join('')}
                            </div>
                        </div>
                        <p class="text-slate-400 text-sm italic mb-6">"${s.Bio.substring(0, 100)}..."</p>
                        <a href="${s.Github}" target="_blank" class="block text-center bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-bold transition">View Portfolio</a>
                    </div>`;
            });
        }
        window.onload = searchSkills;
    </script>
</body>
</html>
