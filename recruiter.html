<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recruiter Gateway | Talent Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-8 font-sans">
    
    <div class="max-w-6xl mx-auto mb-6 flex justify-between items-center">
        <div class="bg-slate-800 text-purple-400 px-4 py-2 rounded-lg font-bold border border-slate-700 shadow-sm">
            Corporate Partner Access
        </div>
        <button onclick="toggleJobForm()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg shadow-md transition flex items-center gap-2">
            <span>➕</span> Post a New Job
        </button>
    </div>

    <div id="job-form-section" class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-slate-200 mb-10 hidden transition-all">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-slate-800 tracking-tight">Create Job Requisition</h2>
            <button onclick="toggleJobForm()" class="text-slate-400 hover:text-red-500 font-bold text-xl">&times;</button>
        </div>
        <form id="post-job-form" onsubmit="submitJobPosting(event)" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Job Title</label>
                <input type="text" id="job-title" required placeholder="e.g. Junior Data Scientist" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Required Exp (Years)</label>
                    <input type="number" step="0.5" id="job-exp" required placeholder="e.g. 0.5" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Location</label>
                    <input type="text" id="job-location" required placeholder="e.g. Remote, Bangalore" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Job Description</label>
                <textarea id="job-desc" required rows="3" placeholder="Describe the role and requirements..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"></textarea>
            </div>
            <button type="submit" id="submit-job-btn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-lg mt-4 transition shadow-lg shadow-slate-300">
                Publish Job to Portal
            </button>
        </form>
    </div>

    <div class="max-w-6xl mx-auto mb-10 text-center">
        <h1 class="text-4xl font-extrabold text-slate-800 mb-4">Talent Search Engine</h1>
        <p class="text-slate-500 mb-8">Find the perfect candidate using our PL/SQL matching algorithm.</p>
        
        <div class="flex max-w-2xl mx-auto shadow-lg rounded-2xl overflow-hidden border border-slate-200">
            <input type="text" id="search-input" placeholder="Search skills (e.g., Python, React, C++)..." class="w-full p-4 outline-none text-slate-700 font-medium">
            <button onclick="searchCandidates()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 transition">Search</button>
        </div>
    </div>

    <div id="results-grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <script>
        const API_BASE = "https://resume-screening-api-vqq8.onrender.com";

        window.onload = () => {
            const pass = prompt("Recruiter Gateway\n\nEnter Recruiter Access Code:");
            if (pass === "9292") {
                searchCandidates(); 
            } else {
                alert("Access Denied: Incorrect Access Code.");
                window.location.href = 'index.html';
            }
        };

        // --- NEW: Toggle Job Form UI ---
        function toggleJobForm() {
            const formSection = document.getElementById('job-form-section');
            formSection.classList.toggle('hidden');
        }

        // --- NEW: Submit Job to Database ---
        async function submitJobPosting(event) {
            event.preventDefault(); // Stop page reload
            const btn = document.getElementById('submit-job-btn');
            btn.innerText = "Publishing...";
            btn.disabled = true;

            const jobData = {
                job_title: document.getElementById('job-title').value,
                required_exp: parseFloat(document.getElementById('job-exp').value),
                location: document.getElementById('job-location').value,
                job_description: document.getElementById('job-desc').value,
                recruiter_id: 1 // Hardcoded for MVP
            };

            try {
                const response = await fetch(`${API_BASE}/recruiter/jobs`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(jobData)
                });
                const result = await response.json();

                if (result.status === 'success') {
                    alert("✅ Job successfully published to the portal!");
                    document.getElementById('post-job-form').reset();
                    toggleJobForm(); // Hide the form again
                } else {
                    alert("Database Error: " + result.message);
                }
            } catch (error) {
                alert("Connection failed. Check if API is running.");
            } finally {
                btn.innerText = "Publish Job to Portal";
                btn.disabled = false;
            }
        }

        // --- EXISTING: PL/SQL Match Search ---
        async function searchCandidates() {
            const grid = document.getElementById('results-grid');
            const skill = document.getElementById('search-input').value;
            grid.innerHTML = '<p class="text-center col-span-full text-slate-400 font-bold animate-pulse">Running algorithmic match via PostgreSQL...</p>';

            try {
                const url = skill 
                    ? `${API_BASE}/recruiter/candidates?skills=${encodeURIComponent(skill)}` 
                    : `${API_BASE}/recruiter/candidates`;

                const response = await fetch(url);
                const candidates = await response.json();
                grid.innerHTML = ''; 

                if (candidates.length === 0) {
                    grid.innerHTML = '<p class="text-center col-span-full text-slate-500 font-bold">No candidates found matching those exact requirements.</p>';
                    return;
                }

                candidates.forEach(student => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition relative overflow-hidden";
                    
                    const scoreBadge = student.match_score > 0 
                        ? `<div class="absolute top-0 right-0 bg-purple-600 text-white text-[10px] font-black px-3 py-1 rounded-bl-lg shadow-sm">🔥 MATCH SCORE: ${student.match_score}</div>`
                        : '';

                    card.innerHTML = `
                        ${scoreBadge}
                        <div class="flex justify-between items-start mb-4 mt-2">
                            <div>
                                <h3 class="text-xl font-bold text-slate-800">${student.first_name || ''} ${student.last_name || ''}</h3>
                                <p class="text-sm text-blue-600 font-semibold">${student.email}</p>
                            </div>
                            <span class="bg-green-100 text-green-700 text-xs font-bold px-3 py-1 rounded-full border border-green-200">CGPA: ${student.cgpa}</span>
                        </div>
                        
                        <div class="mb-4">
                            <p class="text-xs font-black text-slate-400 uppercase tracking-wider mb-2">Technical Stack</p>
                            <div class="flex flex-wrap gap-2">
                                ${(student.skills || '').split(',').map(s => 
                                    s.trim() ? `<span class="bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded-md uppercase font-bold border border-slate-200">${s.trim()}</span>` : ''
                                ).join('')}
                            </div>
                        </div>

                        <div class="mb-6">
                            <p class="text-sm text-slate-600 line-clamp-3 italic">${student.bio || "Candidate has not provided a bio yet."}</p>
                        </div>

                        <a href="${student.github || '#'}" target="_blank" class="block w-full text-center bg-slate-900 hover:bg-slate-800 text-white font-bold py-2 rounded-lg transition shadow-md shadow-slate-300">
                            View GitHub Portfolio
                        </a>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                grid.innerHTML = '<p class="text-center col-span-full text-red-500 font-bold">Failed to connect to the database.</p>';
            }
        }
    </script>
</body>
</html>
