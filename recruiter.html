<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recruiter Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen p-8 text-white">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold text-blue-400">Recruiter Leaderboard</h1>
            <div class="flex gap-4">
                <select id="jobSelect" class="bg-slate-800 border border-slate-600 rounded px-4 py-2 text-white">
                    <option value="0">All Students</option>
                    <option value="1">Data Scientist (8.0+)</option>
                    <option value="2">Frontend Dev (7.0+)</option>
                </select>
                <button onclick="fetchData()" class="bg-emerald-500 px-6 py-2 rounded font-bold">Filter</button>
            </div>
        </div>

        <div class="bg-slate-800 rounded-lg overflow-hidden border border-slate-700">
            <table class="w-full text-left">
                <thead class="bg-slate-700">
                    <tr>
                        <th class="p-4">ID</th>
                        <th class="p-4">Candidate</th>
                        <th class="p-4">Email</th>
                        <th class="p-4">CGPA</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody"></tbody>
            </table>
        </div>
    </div>

   <script>
    const API_BASE = "https://resume-screening-api-vqq8.onrender.com";

    async function fetchData() {
        const jobId = document.getElementById('jobSelect').value;
        const tableBody = document.getElementById('studentTableBody');
        tableBody.innerHTML = '<tr><td colspan="4" class="p-10 text-center animate-pulse text-blue-400">Syncing with Cloud Database...</td></tr>';

        let url = (jobId == "0") ? `${API_BASE}/students` : `${API_BASE}/match/${jobId}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            // Handle both the single list and the match object
            const students = (jobId == "0") ? data : data.candidates;
            
            tableBody.innerHTML = '';

            if (students.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-500">No candidates found for this criteria.</td></tr>';
                return;
            }

            students.forEach(s => {
                // BULLETPROOF LOGIC: Check for all possible naming versions
                const id = s.ID || s.Student_ID || "N/A";
                const firstName = s.FName || s.First_Name || "User";
                const lastName = s.LName || s.Last_Name || "";
                const email = s.Email || s.email || "No Email";
                const cgpa = s.CGPA || s.cgpa || "0.0";

                tableBody.innerHTML += `
                    <tr class="border-b border-slate-700 hover:bg-slate-700/30 transition">
                        <td class="p-4 text-slate-500 font-mono text-sm">${id}</td>
                        <td class="p-4 font-bold text-blue-300">${firstName} ${lastName}</td>
                        <td class="p-4 text-slate-400">${email}</td>
                        <td class="p-4">
                            <span class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20 font-bold">
                                ${cgpa}
                            </span>
                        </td>
                    </tr>`;
            });
        } catch (e) {
            tableBody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-red-400">Server is waking up... Wait 10 seconds and refresh.</td></tr>';
            console.error("Fetch Error:", e);
        }
    }
    // Load data immediately on page open
    window.onload = fetchData;
</script>
</body>
</html>
